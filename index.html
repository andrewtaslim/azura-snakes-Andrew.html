<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Azure Snake - Deluxe Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        html, body { 
            overscroll-behavior: none; 
            touch-action: none; 
            background-color: #0f1a0f; 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        
        #mainWrapper {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            max-width: 600px; 
            padding: 10px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }

        #scoreBoard {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1b331b;
            padding: 12px 20px;
            border-radius: 15px 15px 0 0;
            color: white;
            box-sizing: border-box;
            border-bottom: 2px solid #2d4d2d;
        }

        #canvasWrapper {
            position: relative;
            width: 100%;
            flex-grow: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
            border-radius: 0 0 15px 15px;
        }

        #gameCanvas {
            background-color: #1b331b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: none;
        }
        
        .overlay-content {
            pointer-events: auto;
            width: 85%;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -2px); }
            50% { transform: translate(-3px, 0px); }
            100% { transform: translate(1px, -1px); }
        }
        .shake { animation: shake 0.4s; }
    </style>
</head>
<body>

    <div id="mainWrapper">
        <div id="scoreBoard">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-apple-whole text-red-500"></i>
                <span id="scoreDisplay" class="text-xl font-bold">0</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-crown text-yellow-400"></i>
                <span id="highScoreDisplay" class="text-xl font-bold">0</span>
            </div>
        </div>

        <div id="canvasWrapper">
            <canvas id="gameCanvas"></canvas>

            <div id="startScreen" class="overlay">
                <div class="overlay-content bg-[#1b331b]/95 p-6 rounded-3xl text-center border border-white/10 shadow-2xl">
                    <h1 class="text-3xl font-black text-white mb-2 uppercase italic">Azure Snake</h1>
                    <p class="text-gray-400 text-sm mb-6">Geser layar untuk kontrol.<br>Maksimal 2 ranjau.</p>
                    <button id="startBtn" class="bg-cyan-400 text-black font-black py-3 px-10 rounded-full w-full hover:scale-105 transition-transform active:scale-95">MULAI</button>
                </div>
            </div>

            <div id="gameOverScreen" class="overlay hidden">
                <div class="overlay-content bg-white p-6 rounded-3xl text-center border-4 border-red-500 shadow-2xl">
                    <h2 id="deathTitle" class="text-4xl font-black text-red-600 mb-2 uppercase italic transform -rotate-2">ADUHH!</h2>
                    <p id="deathReasonText" class="text-gray-700 font-bold mb-4"></p>
                    <div class="text-sm text-gray-500 mb-6">SKOR: <span id="finalScore" class="text-2xl text-cyan-600 font-black">0</span></div>
                    <button id="restartBtn" class="bg-black text-white font-black py-3 px-10 rounded-full w-full active:scale-95">COBA LAGI</button>
                </div>
            </div>
        </div>

        <div class="mt-4 text-white/20 text-[10px] uppercase font-bold tracking-widest">Swipe to Control</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const canvasWrapper = document.getElementById('canvasWrapper');
        
        // Grid Default
        const defaultCols = 17;
        const defaultRows = 15;
        let cols = defaultCols, rows = defaultRows;
        let tileSize;

        let snake = [], dx = 1, dy = 0, food = {}, mines = [];
        let score = 0, highScore = localStorage.getItem('snakeHigh') || 0;
        let isGameOver = false, hasStarted = false, isExploded = false;
        let moveProgress = 0, lastTimestamp = 0;
        let baseSpeed = 0.0055, currentSpeed = baseSpeed;

        document.getElementById('highScoreDisplay').innerText = highScore;

        function resize() {
            const w = canvasWrapper.clientWidth;
            const h = canvasWrapper.clientHeight;
            
            // Logika Responsif Dinamis: Jika layar potret (HP), tambah jumlah baris (Rows)
            if (h > w) {
                cols = 17;
                rows = Math.floor((h / w) * cols);
                // Batas agar stage tetap nyaman dimainkan
                if (rows > 28) rows = 28;
                if (rows < 15) rows = 15;
            } else {
                cols = 17;
                rows = 15;
            }
            
            const tW = w / cols;
            const tH = h / rows;
            tileSize = Math.min(tW, tH);

            canvas.width = tileSize * cols;
            canvas.height = tileSize * rows;
            
            canvas.style.marginTop = "0px"; 
        }

        window.addEventListener('resize', () => {
            const oldRows = rows;
            const oldCols = cols;
            resize();
            if (hasStarted && (oldRows !== rows || oldCols !== cols)) {
                if (food.x >= cols) food.x = cols - 1;
                if (food.y >= rows) food.y = rows - 1;
            }
        });
        resize();

        function spawnFood() {
            food = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
            if (snake.some(s => s.x === food.x && s.y === food.y) || mines.some(m => m.x === food.x && m.y === food.y)) spawnFood();
        }

        function spawnMine() {
            if (mines.length >= 2) return;
            let m = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
            if (snake.some(s => s.x === m.x && s.y === m.y) || (food.x === m.x && food.y === m.y)) spawnMine();
            else mines.push(m);
        }

        function init() {
            resize();
            const startY = Math.floor(rows / 2);
            const startX = Math.floor(cols / 2);
            
            snake = [{x: startX, y: startY}, {x: startX - 1, y: startY}, {x: startX - 2, y: startY}];
            dx = 1; dy = 0; score = 0; mines = [];
            currentSpeed = baseSpeed; moveProgress = 0;
            isGameOver = false; isExploded = false;
            document.getElementById('scoreDisplay').innerText = "0";
            document.getElementById('gameOverScreen').classList.add('hidden');
            spawnFood();
            requestAnimationFrame(render);
        }

        function changeDir(dir) {
            if (!hasStarted || isGameOver) return;
            if (dir === 'U' && dy !== 1) { dx = 0; dy = -1; }
            if (dir === 'D' && dy !== -1) { dx = 0; dy = 1; }
            if (dir === 'L' && dx !== 1) { dx = -1; dy = 0; }
            if (dir === 'R' && dx !== -1) { dx = 1; dy = 0; }
        }

        let tsX, tsY;
        document.addEventListener('touchstart', e => { tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            let teX = e.changedTouches[0].clientX, teY = e.changedTouches[0].clientY;
            let diffX = teX - tsX, diffY = teY - tsY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 30) changeDir(diffX > 0 ? 'R' : 'L');
            } else {
                if (Math.abs(diffY) > 30) changeDir(diffY > 0 ? 'D' : 'U');
            }
        });
        
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') changeDir('U');
            if (e.key === 'ArrowDown') changeDir('D');
            if (e.key === 'ArrowLeft') changeDir('L');
            if (e.key === 'ArrowRight') changeDir('R');
        });

        function update(dt) {
            if (!hasStarted || isGameOver) return;
            moveProgress += dt * currentSpeed;

            if (moveProgress >= 1) {
                moveProgress = 0;
                const head = { x: snake[0].x + dx, y: snake[0].y + dy };

                if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) return die("ADUHH!", "Ular benjol nabrak tembok!");
                if (snake.some(s => s.x === head.x && s.y === head.y)) return die("OWW!", "Ular gigit badan sendiri!");
                if (mines.some(m => m.x === head.x && m.y === head.y)) { isExploded = true; return die("DUAARR!", "Kepala ular kena ranjau!"); }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    document.getElementById('scoreDisplay').innerText = score;
                    currentSpeed += 0.0001;
                    if (score === 10 || score === 20) spawnMine();
                    spawnFood();
                } else snake.pop();
            }
        }

        function die(title, reason) {
            isGameOver = true;
            if (isExploded) { canvasWrapper.classList.add('shake'); setTimeout(() => canvasWrapper.classList.remove('shake'), 400); }
            if (score > highScore) { highScore = score; localStorage.setItem('snakeHigh', score); document.getElementById('highScoreDisplay').innerText = score; }
            document.getElementById('deathTitle').innerText = title;
            document.getElementById('deathReasonText').innerText = reason;
            document.getElementById('finalScore').innerText = score;
            setTimeout(() => document.getElementById('gameOverScreen').classList.remove('hidden'), 500);
        }

        function render(now) {
            const dt = now - lastTimestamp;
            lastTimestamp = now;
            update(dt);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    ctx.fillStyle = (r+c)%2===0 ? '#1b331b' : '#152b15';
                    ctx.fillRect(c*tileSize, r*tileSize, tileSize, tileSize);
                }
            }

            ctx.fillStyle = '#ff4d4d';
            ctx.beginPath();
            ctx.arc(food.x*tileSize + tileSize/2, food.y*tileSize + tileSize/2, tileSize/2.5, 0, Math.PI*2);
            ctx.fill();

            mines.forEach(m => {
                ctx.fillStyle = '#333';
                ctx.fillRect(m.x*tileSize+2, m.y*tileSize+2, tileSize-4, tileSize-4);
                ctx.fillStyle = (Math.floor(now/400)%2===0) ? 'red' : '#600';
                ctx.beginPath(); ctx.arc(m.x*tileSize+tileSize/2, m.y*tileSize+tileSize/2, tileSize/6, 0, Math.PI*2); ctx.fill();
            });

            if (snake.length > 0) {
                const headX = (snake[0].x + (isGameOver ? 0 : dx * moveProgress)) * tileSize + tileSize/2;
                const headY = (snake[0].y + (isGameOver ? 0 : dy * moveProgress)) * tileSize + tileSize/2;

                // Animasi Lidah
                if (!isGameOver && Math.floor(now / 200) % 2 === 0) {
                    ctx.strokeStyle = '#ff3366';
                    ctx.lineWidth = tileSize / 10;
                    ctx.beginPath();
                    ctx.moveTo(headX, headY);
                    ctx.lineTo(headX + dx * (tileSize/1.5), headY + dy * (tileSize/1.5));
                    ctx.stroke();
                }

                ctx.beginPath();
                ctx.lineWidth = tileSize * 0.8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = '#00d4ff';
                ctx.moveTo(headX, headY);
                snake.forEach((s, i) => {
                    if (i === 0) return;
                    const prev = snake[i-1];
                    const p = isGameOver ? 0 : moveProgress;
                    const curX = (s.x + (prev.x - s.x) * p) * tileSize + tileSize/2;
                    const curY = (s.y + (prev.y - s.y) * p) * tileSize + tileSize/2;
                    ctx.lineTo(curX, curY);
                });
                ctx.stroke();

                if (isGameOver && !isExploded) {
                    ctx.font = `${tileSize * 0.7}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.fillText('⭐', headX, headY - tileSize/2);
                }

                ctx.fillStyle = isGameOver ? (isExploded ? 'yellow' : 'white') : 'white';
                const eyeOff = tileSize/4;
                ctx.beginPath();
                ctx.arc(headX - (dy*eyeOff) + (dx*eyeOff), headY - (dx*eyeOff) + (dy*eyeOff), tileSize/6, 0, 2*Math.PI);
                ctx.arc(headX + (dy*eyeOff) + (dx*eyeOff), headY + (dx*eyeOff) + (dy*eyeOff), tileSize/6, 0, 2*Math.PI);
                ctx.fill();
                
                if (!isGameOver || !isExploded) {
                    ctx.fillStyle = 'black';
                    ctx.beginPath();
                    ctx.arc(headX - (dy*eyeOff) + (dx*eyeOff*1.2), headY - (dx*eyeOff) + (dy*eyeOff*1.2), tileSize/15, 0, 2*Math.PI);
                    ctx.arc(headX + (dy*eyeOff) + (dx*eyeOff*1.2), headY + (dx*eyeOff) + (dy*eyeOff*1.2), tileSize/15, 0, 2*Math.PI);
                    ctx.fill();
                }
            }

            requestAnimationFrame(render);
        }

        document.getElementById('startBtn').addEventListener('click', () => { hasStarted = true; document.getElementById('startScreen').classList.add('hidden'); });
        document.getElementById('restartBtn').addEventListener('click', init);
        
        init();
    </script>
</body>
</html>
